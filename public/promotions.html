<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Акции — SVS Beauty Space</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  .promo-card { transition: transform .15s, box-shadow .15s; }
  .promo-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,.08); }
  .badge { display:inline-block; padding:3px 10px; border-radius:99px; font-size:11px; font-weight:600 }
  .b-shop  { background:#dbeafe; color:#1e40af }
  .b-salon { background:#fce7f3; color:#9f1239 }
  .b-combo { background:#ede9fe; color:#5b21b6 }
</style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-white min-h-screen">

<header class="bg-white border-b">
  <div class="max-w-5xl mx-auto px-6 py-5 flex justify-between items-center">
    <a href="/" class="text-xl font-bold">SVS Beauty Space</a>
    <nav class="text-sm flex gap-5">
      <a href="/promotions.html" class="text-slate-900 font-semibold">Акции</a>
      <a href="/my.html" class="text-slate-600 hover:text-slate-900">Кабинет</a>
    </nav>
  </div>
</header>

<main class="max-w-5xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-bold mb-2">Акции</h1>
  <p class="text-slate-500 mb-8">Скидки и спецпредложения от салона и магазина</p>

  <div class="flex gap-2 mb-6">
    <button onclick="filterCat('')" class="filter-btn bg-slate-900 text-white px-4 py-2 rounded-lg text-sm" data-c="">Все</button>
    <button onclick="filterCat('shop')" class="filter-btn bg-slate-100 px-4 py-2 rounded-lg text-sm" data-c="shop">Магазин</button>
    <button onclick="filterCat('salon')" class="filter-btn bg-slate-100 px-4 py-2 rounded-lg text-sm" data-c="salon">Салон</button>
    <button onclick="filterCat('combo')" class="filter-btn bg-slate-100 px-4 py-2 rounded-lg text-sm" data-c="combo">Комбо</button>
    <div class="flex-1"></div>
    <select id="sort" onchange="load()" class="border rounded-lg px-3 py-2 text-sm bg-white">
      <option value="newest">Новые сверху</option>
      <option value="discount">Большая скидка</option>
      <option value="ending">Скоро закончатся</option>
    </select>
  </div>

  <div id="list" class="grid md:grid-cols-2 gap-5">
    <p class="text-slate-500 col-span-2">Загрузка…</p>
  </div>
</main>

<script>
const API = 'https://5071e3cc6935b7.lhr.life';
let currentCat = '';

function filterCat(c) {
  currentCat = c;
  document.querySelectorAll('.filter-btn').forEach(b => {
    if (b.dataset.c === c) b.className = 'filter-btn bg-slate-900 text-white px-4 py-2 rounded-lg text-sm';
    else b.className = 'filter-btn bg-slate-100 px-4 py-2 rounded-lg text-sm';
  });
  load();
}

async function load() {
  const params = new URLSearchParams();
  if (currentCat) params.append('category', currentCat);
  params.append('sort', document.getElementById('sort').value);
  const r = await fetch(`${API}/api/promotions?${params}`).then(r => r.json()).catch(() => ({items:[]}));
  const list = document.getElementById('list');
  if (!r.items?.length) {
    list.innerHTML = '<p class="text-slate-500 col-span-2 py-12 text-center">Акций сейчас нет — заходите позже</p>';
    return;
  }
  list.innerHTML = r.items.map(p => {
    const catLabel = p.category==='shop'?'Магазин':p.category==='salon'?'Салон':'Комбо';
    const catClass = 'b-'+p.category;
    const discount = p.discount_pct ? `−${p.discount_pct}%` : (p.discount_uah ? `−${p.discount_uah}₴` : '🎁');
    const ends = p.ends_at ? `до ${new Date(p.ends_at).toLocaleDateString('ru-UA')}` : 'бессрочно';
    return `
      <article class="promo-card bg-white rounded-2xl border border-slate-200 p-5">
        <div class="flex justify-between mb-3">
          <span class="badge ${catClass}">${catLabel}</span>
          <span class="text-2xl font-bold text-emerald-600">${discount}</span>
        </div>
        <h3 class="text-lg font-semibold mb-1">${p.title}</h3>
        ${p.description ? `<p class="text-sm text-slate-600 mb-3">${p.description}</p>` : ''}
        <p class="text-xs text-slate-500">${ends}</p>
      </article>
    `;
  }).join('');
}

load();
</script>
</body>
</html>
