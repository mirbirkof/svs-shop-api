<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Промокоди — SVS Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
<div class="max-w-5xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold">Промокоди</h1>
    <a href="/admin/" class="text-sm text-slate-500 hover:text-slate-700">← до головної</a>
  </div>

  <div class="bg-white rounded-xl shadow p-5 mb-6">
    <h2 class="font-semibold mb-3">Створити промокод</h2>
    <form id="createForm" class="grid grid-cols-1 md:grid-cols-3 gap-3">
      <input name="code" required placeholder="CODE" class="border rounded px-3 py-2 uppercase">
      <select name="type" class="border rounded px-3 py-2">
        <option value="percent">% знижки</option>
        <option value="fixed">фікс. грн</option>
      </select>
      <input name="value" type="number" min="1" required placeholder="Значення" class="border rounded px-3 py-2">
      <input name="min_total" type="number" min="0" placeholder="Мін. сума (грн)" class="border rounded px-3 py-2">
      <input name="max_uses" type="number" min="1" placeholder="Макс. використань" class="border rounded px-3 py-2">
      <input name="valid_until" type="date" class="border rounded px-3 py-2">
      <button class="md:col-span-3 bg-emerald-600 text-white rounded py-2 hover:bg-emerald-700">Створити</button>
    </form>
    <div id="createMsg" class="mt-3 text-sm"></div>
  </div>

  <div class="bg-white rounded-xl shadow">
    <div class="px-5 py-3 border-b font-semibold flex justify-between items-center">
      <span>Активні промокоди</span>
      <button id="reload" class="text-sm text-blue-600 hover:underline">Оновити</button>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-100">
          <tr>
            <th class="text-left p-3">Код</th>
            <th class="text-left p-3">Тип</th>
            <th class="text-right p-3">Знижка</th>
            <th class="text-right p-3">Мін. сума</th>
            <th class="text-right p-3">Використано</th>
            <th class="text-left p-3">Діє до</th>
            <th class="text-right p-3"></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const TOKEN = localStorage.getItem('admin_token') || prompt('ADMIN_TOKEN');
if (TOKEN) localStorage.setItem('admin_token', TOKEN);
const H = { 'X-Admin-Token': TOKEN, 'Content-Type': 'application/json' };

async function load() {
  const r = await fetch('/api/promo/admin/list', { headers: H });
  const data = await r.json();
  const rows = document.getElementById('rows');
  if (!data.ok) { rows.innerHTML = `<tr><td colspan="7" class="p-4 text-red-600">${data.error || 'Помилка'}</td></tr>`; return; }
  const list = data.items || data.promos || [];
  if (!list.length) { rows.innerHTML = '<tr><td colspan="7" class="p-4 text-slate-400">Промокодів ще немає</td></tr>'; return; }
  rows.innerHTML = list.map(p => `
    <tr class="border-t">
      <td class="p-3 font-mono font-bold">${p.code}</td>
      <td class="p-3">${p.type === 'percent' ? '%' : 'грн'}</td>
      <td class="p-3 text-right">${p.value}${p.type === 'percent' ? '%' : ' ₴'}</td>
      <td class="p-3 text-right">${p.min_total || 0} ₴</td>
      <td class="p-3 text-right">${p.uses_count || 0}${p.max_uses ? '/' + p.max_uses : ''}</td>
      <td class="p-3">${p.valid_until ? new Date(p.valid_until).toLocaleDateString('uk') : '∞'}</td>
      <td class="p-3 text-right"><button data-code="${p.code}" class="del text-red-600 hover:underline">Деактивувати</button></td>
    </tr>`).join('');
  rows.querySelectorAll('.del').forEach(b => b.onclick = async () => {
    if (!confirm('Деактивувати ' + b.dataset.code + '?')) return;
    await fetch('/api/promo/admin/' + b.dataset.code, { method: 'DELETE', headers: H });
    load();
  });
}

document.getElementById('createForm').onsubmit = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = {};
  fd.forEach((v, k) => { if (v) body[k] = (k === 'value' || k === 'min_total' || k === 'max_uses') ? Number(v) : v; });
  body.code = body.code.toUpperCase();
  const r = await fetch('/api/promo/admin/create', { method: 'POST', headers: H, body: JSON.stringify(body) });
  const j = await r.json();
  const msg = document.getElementById('createMsg');
  if (j.ok) { msg.className = 'mt-3 text-sm text-emerald-600'; msg.textContent = 'Створено: ' + body.code; e.target.reset(); load(); }
  else { msg.className = 'mt-3 text-sm text-red-600'; msg.textContent = j.error || 'Помилка'; }
};

document.getElementById('reload').onclick = load;
load();
</script>
</body>
</html>
