<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SVS CRM — Скидання пароля</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#0f1419;color:#e6e9ee;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#1a1f2a;border-radius:16px;padding:32px;max-width:380px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4)}
  h1{margin:0 0 6px;font-size:22px}
  .sub{color:#8a93a3;font-size:14px;margin-bottom:24px}
  label{display:block;font-size:13px;color:#aab2c0;margin:14px 0 6px}
  input{width:100%;padding:12px 14px;background:#0f1419;border:1px solid #2a3142;border-radius:10px;color:#e6e9ee;font-size:15px;font-family:inherit}
  input:focus{outline:none;border-color:#6b9bff}
  button{width:100%;padding:13px;background:#6b9bff;color:#0f1419;border:none;border-radius:10px;font-weight:600;font-size:15px;margin-top:18px;cursor:pointer}
  button:disabled{opacity:.4;cursor:not-allowed}
  .msg{margin-top:14px;padding:10px 12px;border-radius:8px;font-size:13px;display:none}
  .msg.ok{background:#163a2a;color:#7ad9a8;display:block}
  .msg.err{background:#3a1818;color:#ff9999;display:block}
  .hint{font-size:12px;color:#8a93a3;margin-top:6px}
</style></head>
<body>
<div class="card">
  <h1>SVS CRM</h1>
  <div class="sub">Скидання пароля</div>
  <label for="pwd">Новий пароль</label>
  <input id="pwd" type="password" autocomplete="new-password">
  <div class="hint">Мінімум 8 символів, велика + мала літера, цифра.</div>
  <label for="pwd2">Підтвердження</label>
  <input id="pwd2" type="password" autocomplete="new-password">
  <button id="btn">Зберегти пароль</button>
  <div id="msg" class="msg"></div>
</div>
<script>
const $ = id => document.getElementById(id);
function show(t,k){const m=$('msg');m.className='msg '+k;m.textContent=t;}
function getToken(){return new URLSearchParams(location.search).get('token')||'';}
$('btn').onclick = async () => {
  const p = $('pwd').value, p2 = $('pwd2').value;
  if(p !== p2){ show('Паролі не співпадають','err'); return; }
  if(p.length < 8){ show('Мінімум 8 символів','err'); return; }
  $('btn').disabled = true;
  try {
    const r = await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ token:getToken(), new_password:p })});
    const d = await r.json();
    if(d.ok){ show('Пароль оновлено. Перенаправлення на вхід...','ok'); setTimeout(()=>location.href='/admin/login.html',1200); }
    else { show(d.error==='token-invalid-or-expired'?'Посилання прострочене':d.error||'Помилка','err'); }
  } catch(e){ show('Мережева помилка: '+e.message,'err'); }
  finally { $('btn').disabled = false; }
};
</script></body></html>
